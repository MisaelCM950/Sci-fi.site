<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/Homepage.css">
  <meta charset="UTF-8">
  <link rel="icon" href="/Logo Site.png">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sci-Fi Password Generator</title>
  <meta name="description" content="A sci-fi-themed digital tool hub. Precision terminals for your digital and physical protocols, including our Cyber-Nutrient Terminal for calorie calculation and our Quantum Key Synthesizer for ultra-secure passwords. More unique terminals are coming online soon.">
</head>
<body>
    
    <div class="dashboard-layout">
      <div class="left-column">
        <a href="/index.html" id="logo-link"><img src="/Logo Site.png" alt="Neon sci-fi calculator terminal logo" id="home-button"></a>
        <div class="calcHome">
          <img src="Password Generator.png" style="width: 150px; margin: 0; margin-top: -50px;" alt="Encryption Icon">

          <h2 style="color: var(--neon-blue); text-transform: uppercase; margin-bottom: 0;">Quantum Key</h2>
          <div style="position: relative; width: 100%; display: flex; align-items: center; justify-content: center;">
            <input type="text" class="input-style" id="password-output" placeholder="Awaiting Synthesis" readonly style="text-align: center; font-size: 1.12rem; letter-spacing: 2px; padding-right: 65px; box-sizing: border-box;"> 
            <div class="custom-tooltip" data-tooltip="Copy to clipboard" style="position: absolute; right: 50px; display: flex;">
              <img id="Copy-to-clipboard" src="Copy-to-clipboard.png" style="cursor: pointer; width: 50px;" alt="Copy">
            </div>
          </div>
          <label for="" style="margin-top: 20px;">Key Complexity:  <span id="length-display">16</span> </label>

          <input type="range" id="password-length" min="8" max="64" value="16" style="width: 80%; cursor: pointer;" >

          <label for="" style="margin-top: 10px;">Parameters: </label>

          <div class="radio-container" style="flex-wrap: wrap;">
            <div class="radio-option">
              <input type="checkbox" id="inc-uppercase" checked>
              <label for="inc-uppercase">ABC</label>
            </div>
            <div class="radio-option">
              <input type="checkbox" id="inc-numbers" checked>
              <label for="inc-numbers">123</label>
            </div>
              <div class="radio-option">
                <input type="checkbox" id="inc-symbols" checked>
                <label for="inc-symbols">!@$</label>
              </div>
          </div>
            <button onclick="generateKey();" class="input-style" style="margin-top: 20px; font-weight: bold; letter-spacing: 1px; color: var(--neon-blue);">Synthesize</button>
        </div>
      </div> 
    </div>
        


  


    <footer class="cyber-footer">
      <div class="footer-links">
        <a href="/About">About</a>
        <a href="/Contact">Contact</a>
        <a href="/Privacy">Privacy Policy</a>
        <a href="/Terms">Terms of Service</a>
      </div>
      <p class="copyright">@2026 Sci-Fi.site. All rights reserved</p>
    </footer>

  <script src="encryption.js"></script>
</body>
</html>
